workflows:
  ios-smoke-test:
    name: iOS Build Test
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      node: 22
    scripts:
      - name: Install npm dependencies
        script: npm install
      - name: Sync Capacitor iOS project
        script: npx cap sync ios
      - name: Build for simulator (no signing required)
        script: |
          xcodebuild build \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator'

  ios-release:
    name: iOS Release (TestFlight)
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: codemagic_api_key
    environment:
      node: 22
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.hormonemethod.app
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
    scripts:
      - name: Install npm dependencies
        script: npm install
      - name: Sync Capacitor iOS project
        script: npx cap sync ios
      - name: Set up code signing
        script: |
          xcode-project use-profiles
      - name: Increment build number
        script: |
          LATEST_BUILD_NUMBER=$(app-store-connect get-latest-app-store-build-number "com.hormonemethod.app" || echo 0)
          agvtool new-version -all $(($LATEST_BUILD_NUMBER + 1))
        working_directory: ios/App
      - name: Build ipa for distribution
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
